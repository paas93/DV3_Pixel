<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PixelTileConverter</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="app-header">
    <div>
      <p class="eyebrow">DV3 Tile Palette Image Converter</p>
      <h1>DV3_PixelTileConverter</h1>
      <p class="lead">이미지를 DV3 인게임 타일 팔레트 기준으로 픽셀/그리드 변환합니다.</p>
    </div>
  </header>

  <main class="layout">
    <section class="panel controls">
      <h2>1. 이미지 업로드</h2>
      <label class="file-drop" for="imageInput">
        <input id="imageInput" type="file" accept="image/*" />
        <span>이미지를 선택하거나 드래그하세요</span>
        <small>PNG, JPG, WEBP 지원</small>
      </label>

      <h2>2. 캔버스 그리드</h2>
      <div class="preset-grid" id="presetGrid"></div>
      <div class="custom-grid">
        <label>가로 칸 수
          <input id="gridWidth" type="number" min="1" max="300" value="48" />
        </label>
        <label>세로 칸 수
          <input id="gridHeight" type="number" min="1" max="300" value="48" />
        </label>
      </div>
      <p class="hint">같은 비율로 축소/확대 됩니다.(ex. W49 H31)</p>

      <h2>3. 표시 옵션</h2>
      <label class="check-row"><input id="showGrid" type="checkbox" checked /> 그리드 라인 표시</label>
      <label class="check-row"><input id="showLabels" type="checkbox" /> 타일명 약어 표시</label>
      <label class="check-row"><input id="dither" type="checkbox" /> 디더링 적용</label>

      <div class="actions">
        <button id="convertBtn" class="primary" disabled>변환하기</button>
        <button id="downloadPngBtn" disabled>PNG 다운로드</button>
        <button id="downloadCsvBtn" disabled>CSV 다운로드</button>
      </div>
    </section>

    <section class="panel preview-panel">
      <div class="preview-head">
        <div>
          <h2>변환 결과</h2>
          <p id="statusText">이미지를 업로드하면 결과가 표시됩니다.</p>
        </div>
        <div id="hoverInfo" class="hover-info">타일명: -</div>
      </div>
      <div class="canvas-wrap">
        <canvas id="outputCanvas"></canvas>
      </div>
      <div id="legend" class="legend"></div>
    </section>
  </main>

  <template id="legendItemTemplate">
    <button class="legend-item" type="button">
      <span class="swatch"></span>
      <span class="legend-name"></span>
      <span class="legend-hex"></span>
    </button>
  </template>

  <script src="app.js"></script>
</body>
</html>
